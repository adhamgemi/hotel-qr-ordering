services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_ordering
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_ordering"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-service:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hotel_ordering_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/hotel_ordering?sslmode=disable
      - REDIS_URL=redis-service:6379
      - MIGRATIONS_DIR=./db
    depends_on:
      postgres:
        condition: service_healthy
      redis-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: hotel_ordering_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
